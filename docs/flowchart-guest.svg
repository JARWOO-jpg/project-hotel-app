<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f6d365"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5576c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#f6d365" font-size="28" font-weight="bold" filter="url(#glow)">FLOWCHART SISTEM — ALUR GUEST</text>
  <text x="450" y="72" text-anchor="middle" fill="#aaa" font-size="14">Hotel Nusantara Management System</text>

  <!-- ==================== START ==================== -->
  <ellipse cx="450" cy="120" rx="70" ry="28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="126" text-anchor="middle" fill="#f6d365" font-size="16" font-weight="bold">MULAI</text>

  <!-- Arrow START → Visit Website -->
  <line x1="450" y1="148" x2="450" y2="178" stroke="#f6d365" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Visit Website -->
  <rect x="310" y="180" width="280" height="48" rx="12" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="210" text-anchor="middle" fill="#fff" font-size="15">Kunjungi Website Hotel</text>

  <!-- Arrow → Cek Ketersediaan -->
  <line x1="450" y1="228" x2="450" y2="260" stroke="#f6d365" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Cek Ketersediaan Kamar (Parallelogram - Input) -->
  <polygon points="340,262 570,262 590,308 320,308" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="455" y="291" text-anchor="middle" fill="#fff" font-size="14">Input: Tanggal Check-in/out, Tipe Kamar</text>

  <!-- Arrow → Decision -->
  <line x1="450" y1="308" x2="450" y2="340" stroke="#f6d365" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- Decision: Kamar Tersedia? -->
  <polygon points="450,342 580,395 450,448 320,395" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="391" text-anchor="middle" fill="#f6d365" font-size="14" font-weight="bold">Kamar</text>
  <text x="450" y="408" text-anchor="middle" fill="#f6d365" font-size="14" font-weight="bold">Tersedia?</text>

  <!-- ===== YES Branch (Left → Down) ===== -->
  <text x="310" y="388" text-anchor="middle" fill="#43e97b" font-size="13" font-weight="bold">YA ✓</text>
  <line x1="320" y1="395" x2="260" y2="395" stroke="#43e97b" stroke-width="2"/>
  <line x1="260" y1="395" x2="260" y2="470" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Login / Register -->
  <rect x="140" y="472" width="240" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="502" text-anchor="middle" fill="#fff" font-size="15">Login / Register</text>

  <!-- Arrow -->
  <line x1="260" y1="520" x2="260" y2="555" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Pilih Kamar & Tanggal -->
  <rect x="120" y="557" width="280" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="587" text-anchor="middle" fill="#fff" font-size="15">Pilih Kamar &amp; Tanggal</text>

  <!-- Arrow -->
  <line x1="260" y1="605" x2="260" y2="640" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Pilih Pembayaran -->
  <rect x="100" y="642" width="320" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="664" text-anchor="middle" fill="#fff" font-size="14">Pilih Jenis Pembayaran</text>
  <text x="260" y="681" text-anchor="middle" fill="#43e97b" font-size="12">(Lunas 100% / DP 50%)</text>

  <!-- Arrow -->
  <line x1="260" y1="690" x2="260" y2="725" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Pilih Metode -->
  <rect x="100" y="727" width="320" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="749" text-anchor="middle" fill="#fff" font-size="14">Pilih Metode Pembayaran</text>
  <text x="260" y="766" text-anchor="middle" fill="#43e97b" font-size="11">(Cash / Transfer / Kartu Kredit / E-Wallet)</text>

  <!-- Arrow -->
  <line x1="260" y1="775" x2="260" y2="810" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Booking Confirmed -->
  <rect x="130" y="812" width="260" height="48" rx="12" fill="rgba(67,233,123,0.15)" stroke="url(#greenGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="260" y="842" text-anchor="middle" fill="#43e97b" font-size="16" font-weight="bold">Booking Terkonfirmasi</text>

  <!-- Arrow → Status -->
  <line x1="260" y1="860" x2="260" y2="895" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Lihat Status -->
  <rect x="130" y="897" width="260" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="927" text-anchor="middle" fill="#fff" font-size="15">Lihat Status &amp; Invoice</text>

  <!-- Arrow to Cancellation Decision -->
  <line x1="390" y1="836" x2="580" y2="836" stroke="#f5576c" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="580" y1="836" x2="580" y2="875" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Decision: Cancel? -->
  <polygon points="580,877 680,920 580,963 480,920" fill="none" stroke="url(#redGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="917" text-anchor="middle" fill="#f5576c" font-size="13" font-weight="bold">Cancel</text>
  <text x="580" y="933" text-anchor="middle" fill="#f5576c" font-size="13" font-weight="bold">Booking?</text>

  <!-- YES → Refund -->
  <text x="580" y="975" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">YA</text>
  <line x1="580" y1="963" x2="580" y2="1000" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Refund Process -->
  <rect x="460" y="1002" width="240" height="55" rx="12" fill="none" stroke="url(#redGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="1025" text-anchor="middle" fill="#fff" font-size="14">Proses Refund 80%</text>
  <text x="580" y="1044" text-anchor="middle" fill="#f5576c" font-size="11">(Potongan 20% biaya admin)</text>

  <!-- NO → Continue -->
  <text x="695" y="917" text-anchor="start" fill="#43e97b" font-size="12" font-weight="bold">TIDAK</text>
  <line x1="680" y1="920" x2="740" y2="920" stroke="#43e97b" stroke-width="2"/>
  <line x1="740" y1="920" x2="740" y2="1100" stroke="#43e97b" stroke-width="2"/>
  <line x1="740" y1="1100" x2="460" y2="1100" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Arrow Refund → END -->
  <line x1="580" y1="1057" x2="580" y2="1085" stroke="#f5576c" stroke-width="2"/>
  <line x1="580" y1="1085" x2="450" y2="1085" stroke="#f5576c" stroke-width="2"/>
  <line x1="450" y1="1085" x2="450" y2="1100" stroke="#f5576c" stroke-width="2"/>

  <!-- Arrow Status → END -->
  <line x1="260" y1="945" x2="260" y2="1100" stroke="#43e97b" stroke-width="2"/>
  <line x1="260" y1="1100" x2="390" y2="1100" stroke="#43e97b" stroke-width="2"/>

  <!-- ===== NO Branch (Right → Down): Waiting List ===== -->
  <text x="595" y="388" text-anchor="start" fill="#f5576c" font-size="13" font-weight="bold">TIDAK ✗</text>
  <line x1="580" y1="395" x2="700" y2="395" stroke="#f5576c" stroke-width="2"/>
  <line x1="700" y1="395" x2="700" y2="470" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Tampil Saran -->
  <rect x="580" y="472" width="240" height="48" rx="12" fill="none" stroke="url(#redGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="495" text-anchor="middle" fill="#fff" font-size="14">Tampilkan Saran Kamar</text>
  <text x="700" y="512" text-anchor="middle" fill="#f5576c" font-size="11">/ Tanggal Alternatif</text>

  <!-- Arrow -->
  <line x1="700" y1="520" x2="700" y2="558" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Decision: Waiting List? -->
  <polygon points="700,560 800,600 700,640 600,600" fill="none" stroke="url(#redGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="597" text-anchor="middle" fill="#f5576c" font-size="13" font-weight="bold">Waiting</text>
  <text x="700" y="613" text-anchor="middle" fill="#f5576c" font-size="13" font-weight="bold">List?</text>

  <!-- YES → Masuk WL -->
  <text x="700" y="658" text-anchor="middle" fill="#43e97b" font-size="12" font-weight="bold">YA</text>
  <line x1="700" y1="640" x2="700" y2="680" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <rect x="580" y="682" width="240" height="48" rx="12" fill="none" stroke="url(#greenGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="704" text-anchor="middle" fill="#fff" font-size="14">Masuk Waiting List</text>
  <text x="700" y="720" text-anchor="middle" fill="#43e97b" font-size="11">(Status: waiting_list)</text>

  <!-- WL → End -->
  <line x1="700" y1="730" x2="700" y2="770" stroke="#43e97b" stroke-width="2"/>
  <line x1="700" y1="770" x2="820" y2="770" stroke="#43e97b" stroke-width="2"/>
  <line x1="820" y1="770" x2="820" y2="1100" stroke="#43e97b" stroke-width="2"/>
  <line x1="820" y1="1100" x2="520" y2="1100" stroke="#43e97b" stroke-width="2"/>

  <!-- NO WL → End directly -->
  <text x="810" y="597" text-anchor="start" fill="#f5576c" font-size="12" font-weight="bold">TIDAK</text>
  <line x1="800" y1="600" x2="850" y2="600" stroke="#f5576c" stroke-width="2"/>
  <line x1="850" y1="600" x2="850" y2="1100" stroke="#f5576c" stroke-width="2"/>
  <line x1="850" y1="1100" x2="520" y2="1100" stroke="#f5576c" stroke-width="2"/>

  <!-- END -->
  <ellipse cx="450" cy="1110" rx="70" ry="28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="1116" text-anchor="middle" fill="#f6d365" font-size="16" font-weight="bold">SELESAI</text>

  <!-- Legend -->
  <rect x="30" y="1170" width="840" height="210" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="450" y="1198" text-anchor="middle" fill="#aaa" font-size="16" font-weight="bold">LEGENDA</text>
  
  <!-- Oval -->
  <ellipse cx="90" cy="1230" rx="40" ry="16" fill="none" stroke="#f6d365" stroke-width="1.5"/>
  <text x="145" y="1236" fill="#ccc" font-size="13">Terminal (Mulai/Selesai)</text>

  <!-- Rectangle -->
  <rect x="50" y="1258" width="80" height="28" rx="8" fill="none" stroke="#43e97b" stroke-width="1.5"/>
  <text x="145" y="1278" fill="#ccc" font-size="13">Proses</text>

  <!-- Diamond -->
  <polygon points="90,1305 120,1320 90,1335 60,1320" fill="none" stroke="#f6d365" stroke-width="1.5"/>
  <text x="145" y="1325" fill="#ccc" font-size="13">Keputusan (Decision)</text>

  <!-- Parallelogram -->
  <polygon points="60,1350 125,1350 135,1375 50,1375" fill="none" stroke="#f6d365" stroke-width="1.5"/>
  <text x="145" y="1367" fill="#ccc" font-size="13">Input/Output</text>

  <!-- Colors -->
  <rect x="450" y="1222" width="20" height="12" rx="3" fill="#43e97b"/>
  <text x="480" y="1233" fill="#ccc" font-size="13">= Alur Berhasil (Success)</text>
  <rect x="450" y="1248" width="20" height="12" rx="3" fill="#f5576c"/>
  <text x="480" y="1259" fill="#ccc" font-size="13">= Alur Gagal / Batal</text>
  <rect x="450" y="1274" width="20" height="12" rx="3" fill="#f6d365"/>
  <text x="480" y="1285" fill="#ccc" font-size="13">= Elemen Umum / Netral</text>

  <text x="450" y="1328" text-anchor="middle" fill="#666" font-size="11">© Hotel Nusantara Management System — Flowchart Alur Guest</text>
</svg>
